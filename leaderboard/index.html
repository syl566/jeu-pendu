<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classement — Jeu du Pendu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
      letter-spacing: 0.05em;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .pendu-art {
      font-family: monospace;
      white-space: pre;
      color: #64748b;
      font-size: 0.75rem;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    table {
      width: 100%;
      max-width: 640px;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    thead {
      background: #334155;
    }

    th, td {
      padding: 0.85rem 1.2rem;
      text-align: left;
    }

    th {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    tbody tr:not(:last-child) {
      border-bottom: 1px solid #334155;
    }

    tbody tr:hover {
      background: #253147;
    }

    .rank {
      font-weight: 700;
      color: #64748b;
      width: 2rem;
    }

    .rank-1 { color: #f59e0b; }
    .rank-2 { color: #94a3b8; }
    .rank-3 { color: #b45309; }

    .player { font-weight: 600; }

    .wins { color: #4ade80; font-weight: 600; }

    .errors { color: #f87171; }

    .loading, .error-msg {
      color: #94a3b8;
      margin-top: 3rem;
      font-size: 1rem;
    }

    .error-msg { color: #f87171; }

    .refresh-btn {
      margin-top: 1.5rem;
      padding: 0.5rem 1.2rem;
      background: #334155;
      color: #e2e8f0;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .refresh-btn:hover { background: #475569; }
  </style>
</head>
<body>

  <div class="pendu-art">  ┌──┐
  │  │
  │  ●
  │ /|\
  │ / \
──┴──</div>

  <h1>Classement</h1>
  <p class="subtitle">Jeu du Pendu — les meilleurs joueurs</p>

  <div id="content">
    <p class="loading">Chargement...</p>
  </div>

  <button class="refresh-btn" onclick="chargerClassement()">Actualiser</button>

  <script>
    // ⚠️  Remplace ces deux valeurs par tes infos Supabase
    const SUPABASE_URL = "https://zpskdsodwjyinavywrkg.supabase.co";
    const SUPABASE_ANON_KEY ="sb_publishable_srWgkrsxqYVb9PEz9FPw0w_o9B-1uLH" ;

    async function chargerClassement() {
      const content = document.getElementById("content");
      content.innerHTML = '<p class="loading">Chargement...</p>';

      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/scores?select=joueur,victoire,nb_erreurs`,
          {
            headers: {
              "apikey": SUPABASE_ANON_KEY,
              "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            },
          }
        );

        if (!res.ok) throw new Error(`Erreur HTTP ${res.status}`);
        const rows = await res.json();

        // Agréger par joueur
        const stats = {};
        for (const row of rows) {
          if (!stats[row.joueur]) {
            stats[row.joueur] = { joueur: row.joueur, victoires: 0, parties: 0, totalErreurs: 0 };
          }
          stats[row.joueur].parties++;
          stats[row.joueur].totalErreurs += row.nb_erreurs;
          if (row.victoire) stats[row.joueur].victoires++;
        }

        const classement = Object.values(stats)
          .map(s => ({ ...s, moyErreurs: (s.totalErreurs / s.parties).toFixed(1) }))
          .sort((a, b) => b.victoires - a.victoires || a.moyErreurs - b.moyErreurs)
          .slice(0, 10);

        if (classement.length === 0) {
          content.innerHTML = '<p class="loading">Aucun score enregistré pour l\'instant.</p>';
          return;
        }

        const rankClass = (i) => i === 1 ? "rank-1" : i === 2 ? "rank-2" : i === 3 ? "rank-3" : "";

        content.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Joueur</th>
                <th>Victoires</th>
                <th>Parties</th>
                <th>Moy. erreurs</th>
              </tr>
            </thead>
            <tbody>
              ${classement.map((s, i) => `
                <tr>
                  <td class="rank ${rankClass(i + 1)}">${i + 1}</td>
                  <td class="player">${s.joueur}</td>
                  <td class="wins">${s.victoires}</td>
                  <td>${s.parties}</td>
                  <td class="errors">${s.moyErreurs}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      } catch (err) {
        content.innerHTML = `<p class="error-msg">Impossible de charger les scores : ${err.message}</p>`;
      }
    }

    chargerClassement();
  </script>

</body>
</html>
